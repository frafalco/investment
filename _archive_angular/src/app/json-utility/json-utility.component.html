<div class="row row-cols-1 row-cols-md-3 g-4">
  <div class="col">
    <div class="card text-center">
      <div class="card-header">Training</div>
      <div class="card-body">
        <button class="btn btn-round btn-primary" (click)="downloadJson()">
          Download Json
        </button>
      </div>
    </div>
  </div>
  <div class="col">
    <div class="card text-center">
      <div class="card-header">Training / Prediction</div>
      <div class="card-body">
        <div class="mb-3 col-sm-12">
          <label for="date" class="form-label">Prediction Date</label>
          <input
            type="string"
            id="date"
            class="form-control"
            placeholder="yyyy-MM-dd"
            [(ngModel)]="date"
          />
        </div>
        <button class="btn btn-round btn-primary" (click)="downloadJsonTraining()">
          Download Json 
        </button>
      </div>
    </div>
  </div>
  <div class="col">
    <div class="card">
      <div class="card-header">Prediction</div>
      <div class="card-body">
        <input
          type="file"
          (change)="onFileChange($event)"
          accept=".csv, .xlsx"
        />
        <button class="btn btn-round btn-primary" (click)="downloadJson()">
          Download Json
        </button>
      </div>
    </div>
  </div>
</div>
