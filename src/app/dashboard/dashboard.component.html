<h1>Your Dashboard</h1>

<!-- Loader mentre i dati vengono caricati -->
<div *ngIf="pageLoading; else notLoading">
  <p>Caricamento in corso...</p>
</div>
<ng-template #notLoading>
<!-- Contenuto principale dopo il caricamento -->
<div *ngIf="isInitialized; else initializeBlock">
  <h3>La tua tabella</h3>
  <button (click)="printSetup()">Get Setup</button>
</div>

<!-- Se non ci sono dati, mostra il form di setup -->
<ng-template #initializeBlock>
  <form
    [formGroup]="setupForm"
    (ngSubmit)="onSubmitSetup()"
    class="form-widget"
  >
    <div>
      <label for="bankroll">Bankroll</label>
      <input
        id="bankroll"
        formControlName="bankroll"
        class="inputField"
        type="number"
        placeholder="Your bankroll"
      />
    </div>
    <div>
      <button type="submit" class="button block" [disabled]="loading">
        {{ loading ? "Loading..." : "Add bankroll" }}
      </button>
    </div>
  </form>
</ng-template>

<!-- Se c'è un errore o la richiesta va in timeout -->
<div *ngIf="!isInitialized && errorMessage">
  <p>Errore: {{ errorMessage }}</p>
</div>
</ng-template>
