<div class="container">
  <h3 class="text-center">Add Bet</h3>
  <form class="row g-8" [formGroup]="submitForm" (ngSubmit)="onSubmit()">
    <div class="mb-3 col-md-6">
      <label for="bookmaker" class="form-label"> Bookmaker </label>
      <input
        id="bookmaker"
        type="text"
        formControlName="bookmaker"
        class="form-control"
      />
      <div
        *ngIf="
          submitForm.controls['bookmaker'].invalid &&
          (submitForm.controls['bookmaker'].dirty ||
            submitForm.controls['bookmaker'].touched)
        "
      >
        <div
          *ngIf="submitForm.controls['bookmaker'].errors!['required']"
          class="error-message"
        >
          Il campo è obbligatorio
        </div>
      </div>
    </div>
    <div class="mb-3 col-md-6">
      <label class="form-label"> Odds </label>
      <input
        id="odds"
        type="number"
        step="0.01"
        formControlName="odds"
        class="form-control"
      />
      <div
        *ngIf="
          submitForm.controls['odds'].invalid &&
          (submitForm.controls['odds'].dirty ||
            submitForm.controls['odds'].touched)
        "
      >
        <div
          *ngIf="submitForm.controls['odds'].errors!['required']"
          class="error-message"
        >
          Il campo è obbligatorio
        </div>
        <div
          *ngIf="submitForm.controls['odds'].errors!['pattern']"
          class="error-message"
        >
          Inserire un valore numerico
        </div>
      </div>
    </div>
    <div class="mb-3 col-md-6">
      <label class="form-label"> Stake </label>
      <input
        id="stake"
        type="number"
        step="0.1"
        formControlName="stake"
        class="form-control"
        (input)="stakeOnChange($event)"
      />
      <div
        *ngIf="
          submitForm.controls['stake'].invalid &&
          (submitForm.controls['stake'].dirty ||
            submitForm.controls['stake'].touched)
        "
      >
        <div
          *ngIf="submitForm.controls['stake'].errors!['required']"
          class="error-message"
        >
          Il campo è obbligatorio
        </div>
        <div
          *ngIf="submitForm.controls['stake'].errors!['pattern']"
          class="error-message"
        >
          Inserire un valore numerico
        </div>
      </div>
    </div>
    <div class="mb-3 col-md-6">
      <label class="form-label"> Bet </label>
      <input
        id="bet"
        type="text"
        readonly
        formControlName="bet"
        class="form-control"
      />
    </div>
    <div class="mb-3 col-md-6">
      <label for="result" class="form-label">Result</label>
      <select formControlName="result" class="form-select" id="result">
        <option value="">--Select--</option>
        <option *ngFor="let option of results" [value]="option.value">
          {{ option.label }}
        </option>
      </select>
      <div
        *ngIf="
          submitForm.controls['result'].invalid &&
          (submitForm.controls['result'].dirty ||
            submitForm.controls['result'].touched)
        "
      >
        <div
          *ngIf="submitForm.controls['result'].errors!['required']"
          class="error-message"
        >
          Il campo è obbligatorio
        </div>
      </div>
    </div>

    <div class="mb-3 col-md-6">
      <label class="form-label"> Choose a date </label>
      <div class="input-group">
        <input
          class="form-control"
          placeholder="yyyy-mm-dd"
          name="dp"
          formControlName="date"
          ngbDatepicker
          #d="ngbDatepicker"
        />
        <button class="btn btn-outline-secondary bi bi-calendar3" (click)="d.toggle()" type="button"></button>
      </div>
    </div>

    <div class="w-100"></div>
    <div class="d-grid gap-2 col-md-4 mx-auto">
      <button
        class="btn btn-primary btn-lg"
        type="submit"
        [disabled]="!submitForm.valid"
      >
        Add
      </button>
    </div>
  </form>
</div>
