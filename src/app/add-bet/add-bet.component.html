<div class="container">
  <div class="card">
    <div class="card-header bg-transparent">
      <h3 class="text-center">Add Bet</h3>
    </div>
    <div class="card-body">
      <form class="row g-8" [formGroup]="submitForm" (ngSubmit)="onSubmit()">
        <div class="mb-3 col-md-6">
          <label for="strategy_id" class="form-label">Strategy</label>
          <select formControlName="strategy_id" class="form-select" id="strategy_id">
            <option value="">Select a strategy</option>
            <option *ngFor="let strategy of strategies$ | async" [value]="strategy.id">
              {{ strategy.name }}
            </option>
          </select>
          <div
            *ngIf="
              submitForm.controls['strategy_id'].invalid &&
              (submitForm.controls['strategy_id'].dirty ||
                submitForm.controls['strategy_id'].touched)
            "
          >
            <div
              *ngIf="submitForm.controls['strategy_id'].errors!['strategy_id']"
              class="error-message"
            >
              Il campo è obbligatorio
            </div>
          </div>
        </div>
        <div class="mb-3 col-md-6">
          <label for="bookmaker" class="form-label"> Bookmaker </label>
          <input
            id="bookmaker"
            type="text"
            formControlName="bookmaker"
            class="form-control"
          />
          <div
            *ngIf="
              submitForm.controls['bookmaker'].invalid &&
              (submitForm.controls['bookmaker'].dirty ||
                submitForm.controls['bookmaker'].touched)
            "
          >
            <div
              *ngIf="submitForm.controls['bookmaker'].errors!['required']"
              class="error-message"
            >
              Il campo è obbligatorio
            </div>
          </div>
        </div>
        <div class="mb-3 col-md-6">
          <label for="date" class="form-label">Event Date</label>
          <app-datetimepicker formControlName="date" name="date"></app-datetimepicker>
          <!-- <div class="input-group">
            <input
              id="date"
              class="form-control"
              placeholder="yyyy-mm-dd"
              name="date"
              formControlName="date"
              ngbDatepicker
              #d="ngbDatepicker"
              readonly
            />
            <button class="btn btn-outline-secondary bi bi-calendar3" (click)="d.toggle()" type="button"></button>
          </div> -->
        </div>
        <div class="mb-3 col-md-6">
          <label for="event" class="form-label"> Evento </label>
          <input
            id="event"
            type="text"
            formControlName="event"
            class="form-control"
          />
          <div
            *ngIf="
              submitForm.controls['event'].invalid &&
              (submitForm.controls['event'].dirty ||
                submitForm.controls['event'].touched)
            "
          >
            <div
              *ngIf="submitForm.controls['event'].errors!['required']"
              class="error-message"
            >
              Il campo è obbligatorio
            </div>
          </div>
        </div>
        <!-- <div class="mb-3 col-md-6">
          <label class="form-label"> Choose a date </label>
          <div class="input-group">
            <input
              class="form-control"
              placeholder="yyyy-mm-dd"
              name="dp"
              formControlName="date"
              ngbDatepicker
              #d="ngbDatepicker"
            />
            <button class="btn btn-outline-secondary bi bi-calendar3" (click)="d.toggle()" type="button"></button>
          </div>
        </div> -->
        <ng-container *ngIf="!isLive; else liveContainer">
        <div class="mb-3 col-md-6">
          <label class="form-label"> Unit </label>
          <input
            id="unit"
            type="number"
            step="1"
            formControlName="unit"
            class="form-control"
          />
          <div
            *ngIf="
              submitForm.controls['unit'].invalid &&
              (submitForm.controls['unit'].dirty ||
                submitForm.controls['unit'].touched)
            "
          >
            <div
              *ngIf="submitForm.controls['unit'].errors!['required']"
              class="error-message"
            >
              Il campo è obbligatorio
            </div>
            <div
              *ngIf="submitForm.controls['unit'].errors!['pattern']"
              class="error-message"
            >
              Inserire un valore numerico
            </div>
          </div>
        </div>
        <div class="mb-3 col-md-6">
          <label class="form-label"> Bet </label>
          <input
            id="bet"
            type="text"
            readonly
            formControlName="bet"
            class="form-control"
          />
        </div>
        <div class="mb-3 col-md-6">
          <label class="form-label"> Odds </label>
          <input
            id="odds"
            type="number"
            step="0.01"
            formControlName="odds"
            class="form-control"
          />
          <div
            *ngIf="
              submitForm.controls['odds'].invalid &&
              (submitForm.controls['odds'].dirty ||
                submitForm.controls['odds'].touched)
            "
          >
            <div
              *ngIf="submitForm.controls['odds'].errors!['required']"
              class="error-message"
            >
              Il campo è obbligatorio
            </div>
            <div
              *ngIf="submitForm.controls['odds'].errors!['pattern']"
              class="error-message"
            >
              Inserire un valore numerico
            </div>
          </div>
        </div>
      </ng-container>
      <ng-template #liveContainer>
        <div formArrayName="bets">
          <div *ngFor="let betGroup of bets.controls; let i = index" [formGroupName]="i" class="row align-items-end">
            <div class="mb-3 col-md-5">
              <label for="unit-{{ i }}">Unit:</label>
              <input [id]="'unit-' + i" type="number" step="1" formControlName="unit" class="form-control"/>
              <div *ngIf="betGroup.get('unit')?.invalid && betGroup.get('unit')?.touched">
                <p *ngIf="betGroup.get('unit')?.errors?.['required']">Unit is required.</p>
                <p *ngIf="betGroup.get('unit')?.errors?.['pattern']">Unit must be a number with up to two decimal places.</p>
              </div>
            </div>
            <div class="mb-3 col-md-5">
              <label for="bet-{{ i }}">Bet:</label>
              <input [id]="'bet-' + i" type="text" readonly formControlName="bet" class="form-control"/>
            </div>
            <div class="mb-3 col-md-2">
              <button class="btn btn-primary btn-md" type="button" (click)="removeBet(i)">Remove</button>
            </div>
          </div>
        </div>
        <div class="w-100"></div>
        <div class="mb-3 col-md-6">
          <button
            class="btn btn-primary btn-md" type="button" (click)="insertNewBet()">
            Insert new bet
          </button>
        </div>
      </ng-template>
        <div class="mb-3 col-md-12">
          <input type="hidden" id="result" formControlName="result"/>
        </div>
        <div class="card-footer bg-transparent">
          <div class="d-grid gap-2 col-md-4 mx-auto">
            <button
              class="btn btn-primary btn-lg"
              type="submit"
              [disabled]="!submitForm.valid"
            >
              Add
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
