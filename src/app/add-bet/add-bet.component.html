<h3>Add Bet</h3>

<form  [formGroup]="submitForm" (ngSubmit)="onSubmit()">

  <div>
    <label for="bookmaker" >
      Bookmaker
    </label>
    <input id="bookmaker" type="text" formControlName="bookmaker" >
  </div>

  <div>
    <label  >
      Odds
    </label>
    <input id="odds" type="text" formControlName="odds">
  </div>

  <div>
    <label >
      Stake
    </label>
    <input id="stake" type="text" formControlName="stake" >
  </div>

  <div >
  <select formControlName="result" >
    <option *ngFor="let option of results"  [value]= 'option.value'>
       {{option.value}}</option>
  </select >
</div>


  <button class="button" type="submit">Add</button>

</form>
<nav>
  <ul>
    <li><a routerLink="/" routerLinkActive="active" ariaCurrentWhenActive="page">Dashboard</a></li>
  </ul>
</nav>
